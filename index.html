<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Learning Game">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e1b4b">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e1b4b'/><text y='68' x='50' text-anchor='middle' font-size='50'>🎓</text></svg>">
<title>Learning Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #ff6b9d;
    --purple: #c084fc;
    --blue: #60a5fa;
    --green: #34d399;
    --yellow: #fbbf24;
    --orange: #fb923c;
    --bg: #1e1b4b;
    --card: #312e81;
    --text: #f8fafc;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  .screen { display: none; width: 100%; max-width: 600px; text-align: center; }
  .screen.active { display: block; }

  h1 {
    font-size: 2.5rem;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle { color: #a5b4fc; font-size: 1.1rem; margin-bottom: 40px; }

  .profiles, .modes { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }

  .profile-btn, .mode-btn {
    background: var(--card);
    border: 3px solid transparent;
    border-radius: 20px;
    padding: 30px 40px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    min-width: 180px;
    color: var(--text);
  }

  .profile-btn:hover, .mode-btn:hover { border-color: var(--purple); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(192,132,252,0.3); }

  .profile-avatar, .mode-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
  }

  .profile-btn:nth-child(1) .profile-avatar { background: linear-gradient(135deg, var(--pink), var(--purple)); }
  .profile-btn:nth-child(2) .profile-avatar { background: linear-gradient(135deg, var(--blue), var(--green)); }
  .profile-btn:nth-child(3) .profile-avatar { background: linear-gradient(135deg, var(--yellow), var(--orange)); }

  .mode-btn:first-child .mode-icon { background: linear-gradient(135deg, var(--yellow), var(--orange)); }
  .mode-btn:last-child .mode-icon { background: linear-gradient(135deg, var(--green), var(--blue)); }

  .profile-name, .mode-name { font-size: 1.4rem; font-weight: 700; }
  .profile-info, .mode-info { font-size: 0.85rem; color: #a5b4fc; }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    padding: 0 4px;
  }

  .player-tag {
    display: flex; align-items: center; gap: 10px;
    background: var(--card);
    padding: 8px 16px;
    border-radius: 30px;
  }

  .player-tag .avatar-sm {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
  }

  .player-tag.elsie .avatar-sm { background: linear-gradient(135deg, var(--pink), var(--purple)); }
  .player-tag.freya .avatar-sm { background: linear-gradient(135deg, var(--blue), var(--green)); }
  .player-tag.teddy .avatar-sm { background: linear-gradient(135deg, var(--yellow), var(--orange)); }

  .nav-pill {
    background: rgba(165,180,252,0.15);
    border: 1px solid rgba(165,180,252,0.3);
    color: #a5b4fc;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 20px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .nav-pill:hover { background: rgba(165,180,252,0.25); }

  .screen-header {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    margin-bottom: 20px;
    width: 100%;
  }

  .mode-tag {
    display: inline-block;
    background: rgba(165,180,252,0.15);
    padding: 3px 12px;
    border-radius: 12px;
    font-size: 0.8rem;
    color: #a5b4fc;
    margin-bottom: 8px;
  }

  .level-badge {
    background: linear-gradient(135deg, var(--purple), var(--blue));
    display: inline-block;
    padding: 6px 20px;
    border-radius: 20px;
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 24px;
  }

  .stats-row {
    display: flex; justify-content: center; gap: 24px;
    margin-bottom: 30px; flex-wrap: wrap;
  }

  .stat { text-align: center; }
  .stat-val { font-size: 1.6rem; font-weight: 700; }
  .stat-label { font-size: 0.75rem; color: #a5b4fc; text-transform: uppercase; letter-spacing: 1px; }

  .game-card {
    background: var(--card);
    border-radius: 24px;
    padding: 40px 30px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .hint-text {
    font-size: 1.15rem;
    color: #c7d2fe;
    line-height: 1.6;
    margin-bottom: 28px;
    min-height: 56px;
  }

  .question-text {
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    min-height: 48px;
    letter-spacing: 1px;
  }

  .hint-text em { color: var(--yellow); font-style: normal; font-weight: 600; }

  .input-row { display: flex; gap: 12px; justify-content: center; align-items: center; }

  .game-input {
    font-size: 1.5rem;
    padding: 14px 20px;
    border-radius: 16px;
    border: 3px solid #4338ca;
    background: #1e1b4b;
    color: var(--text);
    text-align: center;
    width: 100%;
    max-width: 340px;
    outline: none;
    transition: border-color 0.3s;
    font-family: inherit;
    -webkit-user-select: text;
    user-select: text;
  }

  .game-input.spelling-input { letter-spacing: 2px; }
  .game-input:focus { border-color: var(--purple); }
  .game-input.correct { border-color: var(--green); background: rgba(52,211,153,0.1); }
  .game-input.wrong { border-color: var(--pink); background: rgba(255,107,157,0.1); }

  .btn {
    padding: 14px 32px;
    border-radius: 16px;
    border: none;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }

  .btn-primary {
    background: linear-gradient(135deg, var(--purple), var(--blue));
    color: white;
    box-shadow: 0 4px 15px rgba(96,165,250,0.3);
  }

  .btn-hear {
    background: var(--card);
    border: 2px solid #4338ca;
    color: var(--text);
    padding: 14px 20px;
    font-size: 1.3rem;
    border-radius: 50%;
    width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
  }

  .btn-hear:hover { border-color: var(--purple); }

  .action-row {
    display: flex; gap: 12px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .feedback {
    margin-top: 20px;
    font-size: 1.3rem;
    font-weight: 700;
    min-height: 40px;
    transition: all 0.3s;
  }

  .feedback.correct-fb { color: var(--green); }
  .feedback.wrong-fb { color: var(--pink); }

  .correct-answer {
    margin-top: 10px;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--yellow);
  }

  .level-change {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    background: rgba(30,27,75,0.92);
    z-index: 100;
    animation: fadeInOut 2s forwards;
    pointer-events: none;
  }

  .level-change .emoji { font-size: 4rem; }
  .level-change .msg { font-size: 1.8rem; font-weight: 700; }
  .level-change.up .msg { color: var(--green); }
  .level-change.down .msg { color: var(--orange); }

  @keyframes fadeInOut {
    0% { opacity: 0; }
    15% { opacity: 1; }
    75% { opacity: 1; }
    100% { opacity: 0; }
  }

  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    z-index: 90;
    animation: confettiFall 1.5s forwards;
    pointer-events: none;
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .streak-fire { display: inline; }

  /* ===== TEDDY SCREEN STYLES ===== */
  .teddy-stars { margin-bottom: 16px; font-size: 1.5rem; letter-spacing: 4px; min-height: 32px; }

  .teddy-prompt {
    font-size: 1.6rem; font-weight: 700; color: var(--text);
    margin-bottom: 20px; min-height: 48px;
  }

  .teddy-visual {
    font-size: 3.5rem; margin-bottom: 24px; min-height: 60px;
    letter-spacing: 8px; line-height: 1.4;
  }

  .teddy-choices {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; max-width: 400px; margin: 0 auto;
  }

  .teddy-choice {
    background: var(--bg); border: 3px solid #4338ca; border-radius: 20px;
    padding: 24px 16px; font-size: 2.2rem; cursor: pointer;
    transition: all 0.2s; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    min-height: 90px;
  }
  .teddy-choice:hover { border-color: var(--purple); transform: scale(1.03); }
  .teddy-choice.correct-choice { border-color: var(--green); background: rgba(52,211,153,0.15); transform: scale(1.05); }
  .teddy-choice.wrong-choice { border-color: var(--pink); background: rgba(255,107,157,0.1); opacity: 0.6; }
  .teddy-choice.disabled { pointer-events: none; }

  .teddy-feedback { margin-top: 20px; font-size: 1.5rem; font-weight: 700; min-height: 40px; }
  .teddy-feedback.correct-fb { color: var(--green); }
  .teddy-feedback.wrong-fb { color: var(--pink); }

  /* Numberblocks block towers & arrays */
  .nb-tower { display: inline-flex; flex-direction: column-reverse; align-items: center; margin: 0 6px; }
  .nb-block { width: 28px; height: 28px; border-radius: 4px; margin: 1px 0; border: 1px solid rgba(0,0,0,0.15); }
  .nb-label { font-size: 1rem; font-weight: 700; margin-top: 2px; color: var(--text); }
  .nb-sum { display: flex; align-items: flex-end; justify-content: center; gap: 8px; flex-wrap: wrap; }
  .nb-op { font-size: 1.5rem; font-weight: 700; align-self: center; color: var(--text); }
  .nb-array { display: inline-grid; gap: 2px; }
  .nb-array .nb-block { width: 24px; height: 24px; }
  .nb-array-label { font-size: 0.9rem; font-weight: 600; margin-top: 4px; color: var(--text); text-align: center; }
  /* Smaller blocks for Elsie/Freya visual area */
  .nb-sm .nb-block { width: 20px; height: 20px; }
  .nb-sm .nb-label { font-size: 0.85rem; }
  .nb-sm .nb-array .nb-block { width: 18px; height: 18px; }
  /* Visual area for Elsie/Freya game */
  .question-visual { margin: 8px 0; min-height: 0; display: flex; justify-content: center; align-items: flex-end; }

  @media (max-width: 500px) {
    body { padding: 12px; padding-top: env(safe-area-inset-top, 12px); }
    h1 { font-size: 1.8rem; }
    .subtitle { font-size: 1rem; margin-bottom: 24px; }
    .profiles, .modes { flex-direction: column; align-items: stretch; gap: 12px; }
    .profile-btn, .mode-btn {
      flex-direction: row; gap: 16px; text-align: left;
      padding: 20px 24px; min-width: unset; flex: unset;
    }
    .profile-avatar, .mode-icon { width: 56px; height: 56px; font-size: 1.8rem; flex-shrink: 0; }
    .profile-name, .mode-name { font-size: 1.3rem; }
    .profile-info, .mode-info { font-size: 0.9rem; }
    .screen-header { margin-bottom: 12px; }
    .nav-pill { font-size: 0.8rem; padding: 8px 14px; min-height: 40px; }
    .game-header { margin-bottom: 12px; }
    .game-card { padding: 20px 16px; }
    .game-input { font-size: 16px; max-width: 100%; padding: 14px; }
    .question-text { font-size: 1.5rem; }
    .hint-text { font-size: 1rem; margin-bottom: 16px; min-height: 36px; }
    .stats-row { gap: 16px; margin-bottom: 16px; }
    .stat-val { font-size: 1.3rem; }
    .level-badge { font-size: 0.9rem; padding: 5px 16px; margin-bottom: 12px; }
    .btn { padding: 14px 28px; font-size: 1rem; min-height: 48px; }
    .btn-hear { width: 48px; height: 48px; min-height: 48px; font-size: 1.2rem; padding: 12px; }
    .input-row { gap: 8px; }
    .action-row { margin-top: 12px; }
    .feedback { font-size: 1.1rem; }
    .correct-answer { font-size: 1.3rem; }
    .player-tag { padding: 6px 12px; }
    .player-tag .avatar-sm { width: 28px; height: 28px; font-size: 0.9rem; }
    /* Teddy mobile */
    .teddy-visual { font-size: 2.8rem; letter-spacing: 4px; }
    .teddy-choice { padding: 20px 12px; font-size: 1.8rem; min-height: 80px; }
    .teddy-prompt { font-size: 1.3rem; }
  }

  @media (max-width: 360px) {
    h1 { font-size: 1.5rem; }
    .profile-btn, .mode-btn { padding: 16px 18px; }
    .profile-avatar, .mode-icon { width: 48px; height: 48px; font-size: 1.5rem; }
    .game-card { padding: 16px 12px; }
    .question-text { font-size: 1.3rem; }
  }

  /* Compact layout when mobile keyboard is open */
  .keyboard-open .game-header { margin-bottom: 6px; }
  .keyboard-open .mode-tag { display: none; }
  .keyboard-open .level-badge { margin-bottom: 6px; padding: 3px 12px; font-size: 0.75rem; }
  .keyboard-open .stats-row { margin-bottom: 6px; gap: 12px; }
  .keyboard-open .stat-val { font-size: 1rem; }
  .keyboard-open .stat-label { font-size: 0.6rem; }
  .keyboard-open .game-card { padding: 14px 12px; }
  .keyboard-open .hint-text { font-size: 0.85rem; margin-bottom: 10px; min-height: unset; }
  .keyboard-open .question-text { font-size: 1.2rem; min-height: unset; margin-bottom: 4px; }
  .keyboard-open .feedback { min-height: unset; margin-top: 6px; font-size: 0.95rem; }
  .keyboard-open .correct-answer { font-size: 1.1rem; margin-top: 4px; }
  .keyboard-open .action-row { margin-top: 8px; }
  .keyboard-open .btn { padding: 12px 24px; font-size: 0.95rem; min-height: 42px; }
</style>
</head>
<body>

<!-- ===== SCREEN 1: PROFILE SELECT ===== -->
<div class="screen active" id="screen-select">
  <h1>Learning Adventure</h1>
  <p class="subtitle">Who's playing?</p>
  <div class="profiles">
    <button class="profile-btn" onclick="selectPlayer('elsie')">
      <div class="profile-avatar">&#x1F451;</div>
      <div class="profile-name">Elsie</div>
      <div class="profile-info" id="elsie-info">4th Class</div>
    </button>
    <button class="profile-btn" onclick="selectPlayer('freya')">
      <div class="profile-avatar">&#x1F431;</div>
      <div class="profile-name">Freya</div>
      <div class="profile-info" id="freya-info">2nd Class</div>
    </button>
    <button class="profile-btn" onclick="selectPlayer('teddy')">
      <div class="profile-avatar">&#x1F9F8;</div>
      <div class="profile-name">Teddy</div>
      <div class="profile-info" id="teddy-info">Explorer</div>
    </button>
  </div>
</div>

<!-- ===== SCREEN 2: MODE SELECT ===== -->
<div class="screen" id="screen-mode">
  <div class="screen-header">
    <button class="nav-pill" onclick="goHome()">&#8592; Switch player</button>
  </div>
  <h1 id="mode-title">What shall we practise?</h1>
  <p class="subtitle" id="mode-subtitle"></p>
  <div class="modes">
    <button class="mode-btn" onclick="startGame('spelling')">
      <div class="mode-icon">&#x1F4DD;</div>
      <div class="mode-name">Spelling</div>
      <div class="mode-info" id="spelling-level-info"></div>
    </button>
    <button class="mode-btn" onclick="startGame('maths')">
      <div class="mode-icon">&#x1F522;</div>
      <div class="mode-name">Maths</div>
      <div class="mode-info" id="maths-level-info"></div>
    </button>
  </div>
</div>

<!-- ===== SCREEN 3: GAME (Elsie/Freya) ===== -->
<div class="screen" id="screen-game">
  <div class="game-header">
    <div class="player-tag" id="player-tag">
      <div class="avatar-sm"></div>
      <span id="player-name-tag"></span>
    </div>
    <button class="nav-pill" onclick="goModeSelect()">&#8592; Change subject</button>
  </div>

  <div class="mode-tag" id="mode-tag-label"></div>
  <div class="level-badge" id="level-badge"></div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-val" id="stat-score">0</div>
      <div class="stat-label">Score</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-streak">0</div>
      <div class="stat-label">Streak</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-best">0</div>
      <div class="stat-label">Best Streak</div>
    </div>
  </div>

  <div class="game-card">
    <div class="question-text" id="question-text" style="display:none"></div>
    <div class="question-visual" id="question-visual" style="display:none"></div>
    <div class="hint-text" id="hint-text"></div>
    <div class="input-row">
      <button class="btn btn-hear" id="btn-hear" onclick="hearWord()" title="Hear the word again">&#128264;</button>
      <input type="text" id="game-input" class="game-input" placeholder="Type your answer..." autocomplete="off" autocapitalize="none" spellcheck="false">
    </div>
    <div class="action-row">
      <button class="btn btn-primary" id="btn-check" onclick="checkAnswer()">Check &#10003;</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="correct-answer" id="correct-answer"></div>
  </div>
</div>

<!-- ===== SCREEN 4: TEDDY'S GAME ===== -->
<div class="screen" id="screen-teddy">
  <div class="game-header">
    <div class="player-tag teddy">
      <div class="avatar-sm">&#x1F9F8;</div>
      <span>Teddy</span>
    </div>
    <button class="nav-pill" onclick="goHome()">&#8592; Switch player</button>
  </div>
  <div class="teddy-stars" id="teddy-stars"></div>
  <div class="game-card">
    <div class="teddy-prompt" id="teddy-prompt"></div>
    <div class="teddy-visual" id="teddy-visual"></div>
    <div class="teddy-choices" id="teddy-choices"></div>
    <div class="teddy-feedback" id="teddy-feedback"></div>
  </div>
</div>

<script>
// ===== SPELLING WORD BANK =====
const WORDS = {
  1: [
    { word: "friend", hint: "Someone you like to play with is called a ___." },
    { word: "because", hint: "I was late ___ the bus didn't come." },
    { word: "school", hint: "You go here every morning to learn new things." },
    { word: "family", hint: "Your mum, dad, brothers and sisters are your ___." },
    { word: "thought", hint: "She ___ about what to have for dinner." },
    { word: "people", hint: "There were lots of ___ at the park today." },
    { word: "money", hint: "You use ___ to buy things in a shop." },
    { word: "answer", hint: "Put up your hand if you know the ___." },
    { word: "every", hint: "She eats breakfast ___ morning." },
    { word: "would", hint: "I ___ love to go swimming today." },
    { word: "could", hint: "She ___ run faster than anyone in her class." },
    { word: "should", hint: "You ___ always say please and thank you." },
    { word: "their", hint: "___ dog is so cute and fluffy." },
    { word: "again", hint: "Can we play that game ___?" },
    { word: "little", hint: "The ___ kitten was so tiny." },
    { word: "house", hint: "We live in a ___ with a red door." },
    { word: "water", hint: "I'm thirsty, can I have some ___?" },
    { word: "where", hint: "___ did you put my schoolbag?" },
    { word: "which", hint: "___ flavour of ice cream do you want?" },
    { word: "after", hint: "We can go to the playground ___ lunch." },
    { word: "right", hint: "Turn ___ at the corner to get to the shop." },
    { word: "laugh", hint: "That joke made everyone ___." },
    { word: "enough", hint: "Have you had ___ to eat?" },
    { word: "caught", hint: "She ___ the ball with one hand." },
    { word: "young", hint: "The ___ puppy was only six weeks old." }
  ],
  2: [
    { word: "beautiful", hint: "The sunset was absolutely ___." },
    { word: "different", hint: "Each snowflake is ___ from all the others." },
    { word: "special", hint: "Your birthday is a very ___ day." },
    { word: "through", hint: "The rabbit ran ___ the hole in the fence." },

function gcd(a,b) { a=Math.abs(a); b=Math.abs(b); while(b){[a,b]=[b,a%b];} return a; }

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makeDistractors(correct, pool, count) {
  const options = pool.filter(x => x !== correct);
  const shuffled = shuffleArray(options);
  const result = [correct, ...shuffled.slice(0, count - 1)];
  return shuffleArray(result);
}

function makeNumberDistractors(correct, min, max, count) {
  const options = [correct];
  while (options.length < count) {
    const n = rand(min, max);
    if (!options.includes(n)) options.push(n);
  }
  return shuffleArray(options.map(String));
}

// "5 and a bit" layout for counting (Numberblocks principle)
function makeCountVisual(count, emoji) {
  if (count <= 5) return (emoji + ' ').repeat(count).trim();
  // Show group of 5, then remainder
  return (emoji + ' ').repeat(5).trim() + '  ' + (emoji + ' ').repeat(count - 5).trim();
}

const NB_COLOURS = {

function makeBlockTower(n, showLabel) {
  if (showLabel === undefined) showLabel = true;
  const col = NB_COLOURS[n] || NB_COLOURS[Math.min(n, 10)];
  const isGradient = col.includes('gradient');
  const style = isGradient ? 'background:' + col : 'background-color:' + col;
  let blocks = '';
  for (let i = 0; i < n; i++) blocks += '<div class="nb-block" style="' + style + '"></div>';
  let label = showLabel ? '<div class="nb-label">' + n + '</div>' : '';
  return '<div class="nb-tower">' + blocks + label + '</div>';
}

function makeBlockArray(rows, cols) {
  const col = NB_COLOURS[rows] || NB_COLOURS[Math.min(rows, 10)];
  const isGradient = col.includes('gradient');
  const style = isGradient ? 'background:' + col : 'background-color:' + col;
  let cells = '';
  for (let i = 0; i < rows * cols; i++) cells += '<div class="nb-block" style="' + style + '"></div>';
  return '<div class="nb-array" style="grid-template-columns:repeat(' + cols + ',24px)">' + cells + '</div>';
}

function makeAdditionVisual(a, b) {
  return '<div class="nb-sum">' +
    makeBlockTower(a) +
    '<span class="nb-op">+</span>' +
    makeBlockTower(b) +
    '<span class="nb-op">=</span>' +
    '<span class="nb-op">?</span>' +
    '</div>';
}

function makeMultiplicationVisual(a, b) {
  return '<div style="text-align:center">' +
    makeBlockArray(a, b) +
    '<div class="nb-array-label">' + a + ' \u00d7 ' + b + '</div>' +
    '</div>';
}

// ===== ADAPTIVE SYSTEM =====
const WINDOW_SIZE = 8;
const LEVEL_UP_THRESHOLD = 6;   // 6 of 8 correct = 75%
const LEVEL_DOWN_THRESHOLD = 2; // 2 of 8 correct = 25%
const MIN_ANSWERS_FOR_DOWN = 6; // need at least 6 answers before levelling down

function checkAdaptive(profile, maxLevel) {
  const recent = profile.recentAnswers || [];
  if (recent.length < WINDOW_SIZE) return null;
  const correct = recent.filter(Boolean).length;
  if (correct >= LEVEL_UP_THRESHOLD && profile.level < maxLevel) {
    return 'up';
  }
  if (correct <= LEVEL_DOWN_THRESHOLD && recent.length >= MIN_ANSWERS_FOR_DOWN && profile.level > 1) {
    return 'down';
  }
  return null;
}

function recordAnswer(profile, isCorrect) {
  if (!profile.recentAnswers) profile.recentAnswers = [];
  profile.recentAnswers.push(isCorrect);
  if (profile.recentAnswers.length > WINDOW_SIZE) {
    profile.recentAnswers.shift();
  }
}

// Per-type performance tracking (granular adaptive)
function recordTypeResult(profile, level, tag, isCorrect) {
  if (!profile.typeStats) profile.typeStats = {};
  const key = level + ':' + tag;
  if (!profile.typeStats[key]) profile.typeStats[key] = { right: 0, wrong: 0 };
  const s = profile.typeStats[key];
  if (isCorrect) s.right++; else s.wrong++;
  // Decay: halve when history > 20 to bias toward recent performance
  if (s.right + s.wrong > 20) {
    s.right = Math.floor(s.right / 2);
    s.wrong = Math.floor(s.wrong / 2);
  }
}

// Weighted question selection: inverse-success-rate weighting
function selectWeighted(generators, tags, profile, level, lastTags, missedTypes) {
  const stats = profile.typeStats || {};
  const weights = generators.map(function(gen, i) {
    const tag = tags[i];
    const key = level + ':' + tag;
    const s = stats[key];
    if (!s || (s.right + s.wrong) < 3) return 1.5; // exploration bonus
    var rate = s.right / (s.right + s.wrong);
    // Inverse: struggling→high weight, strong→low weight
    var w = 1 / (rate + 0.1);
    return Math.max(0.3, Math.min(3.0, w));
  });
  // Session missed boost
  var missed = missedTypes || [];
  weights.forEach(function(w, i) {
    var count = missed.filter(function(t) { return t === tags[i]; }).length;
    if (count > 0) weights[i] *= (1 + count * 0.5);
  });
  // Repeat prevention: zero-out last 2 tags (re-enabled if all zeroed)
  if (lastTags && lastTags.length > 0) {
    var hasNonZero = false;
    weights.forEach(function(w, i) {
      if (lastTags.includes(tags[i])) weights[i] = 0;
      else if (w > 0) hasNonZero = true;
    });
    if (!hasNonZero) { // all zeroed — re-enable all
      generators.forEach(function(g, i) {
        var tag = tags[i], key = level + ':' + tag;
        var s = stats[key];
        weights[i] = (!s || (s.right+s.wrong)<3) ? 1.5 : Math.max(0.3, Math.min(3.0, 1/(s.right/(s.right+s.wrong)+0.1)));
      });
    }
  }
  // Weighted random pick
  var total = weights.reduce(function(a,b){return a+b;}, 0);
  var r = Math.random() * total;
  for (var i = 0; i < generators.length; i++) {
    r -= weights[i];
    if (r <= 0) return { gen: generators[i], idx: i, tag: tags[i] };
  }
  return { gen: generators[generators.length-1], idx: generators.length-1, tag: tags[tags.length-1] };
}

function getProfile(mode, name) {
  const key = mode + '_' + name;
  const stored = localStorage.getItem(key);
  if (stored) {
    const p = JSON.parse(stored);
    // Migration: add recentAnswers and typeStats if missing
    if (!p.recentAnswers) p.recentAnswers = [];
    if (!p.typeStats) p.typeStats = {};
    return p;
  }
  if (name === 'teddy') {
    return { name:'teddy', mode:'mixed', level:1, score:0, streak:0, bestStreak:0, recentAnswers:[], typeStats:{} };
  }
  const defaultLevel = name === 'elsie' ? 3 : 1;
  return { name:name, mode:mode, level:defaultLevel, score:0, streak:0, bestStreak:0, recentAnswers:[], typeStats:{} };
}

}

// ===== GAME START (Elsie/Freya) =====
function startGame(mode) {
  currentMode = mode;
  currentProfile = getProfile(mode, currentPlayerName);
  usedWords = [];
  missedWords = [];
  showScreen('screen-game');

  const tag = document.getElementById('player-tag');
  tag.className = 'player-tag ' + currentPlayerName;
  document.getElementById('player-name-tag').textContent = currentPlayerName === 'elsie' ? 'Elsie' : 'Freya';
  document.getElementById('mode-tag-label').textContent = mode === 'spelling' ? '\uD83D\uDCDD Spelling' : '\uD83D\uDD22 Maths';

  const input = document.getElementById('game-input');
  if (mode === 'spelling') {
    input.className = 'game-input spelling-input';
    input.placeholder = 'Type the word...';
    input.inputMode = 'text';
    document.getElementById('btn-hear').style.display = 'flex';
  } else {
    input.className = 'game-input';
    input.placeholder = 'Type your answer...';
    input.inputMode = 'decimal';
    document.getElementById('btn-hear').style.display = 'none';
  }

  updateUI();
  nextQuestion();
}

function updateUI() {
  const p = currentProfile;
  document.getElementById('level-badge').innerHTML = LEVEL_EMOJI[p.level] + ' ' + LEVEL_NAMES[p.level] + ' \u00b7 Level ' + p.level;
  document.getElementById('stat-score').textContent = p.score;
  document.getElementById('stat-best').textContent = p.bestStreak;

  let streakText = String(p.streak);
  if (p.streak >= 3) streakText += ' \uD83D\uDD25';
  if (p.streak >= 6) streakText += '\uD83D\uDD25';
  if (p.streak >= 10) streakText += '\uD83D\uDD25';
  document.getElementById('stat-streak').innerHTML = streakText;
}

// ===== NEXT QUESTION (Elsie/Freya) =====
function nextQuestion() {
  waiting = false;
  const input = document.getElementById('game-input');
  input.value = '';
  input.className = currentMode === 'spelling' ? 'game-input spelling-input' : 'game-input';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('correct-answer').textContent = '';
  document.getElementById('btn-check').textContent = 'Check \u2713';
  document.getElementById('btn-check').onclick = checkAnswer;
  input.disabled = false;
  input.focus();

  if (currentMode === 'spelling') {
    document.getElementById('question-text').style.display = 'none';
    document.getElementById('question-visual').style.display = 'none';
    document.getElementById('question-visual').innerHTML = '';
    document.getElementById('hint-text').style.display = 'block';

    // Missed word recycling: 40% chance to pull from missed words
    let picked = null;
    if (missedWords.length > 0 && Math.random() < 0.4) {
      const idx = Math.floor(Math.random() * missedWords.length);
      const missedWord = missedWords[idx];
      const levelWords = WORDS[currentProfile.level];
      const match = levelWords.find(w => w.word === missedWord);
      if (match) picked = match;
    }

    if (!picked) {
      const levelWords = WORDS[currentProfile.level];
      const available = levelWords.filter(w => !usedWords.includes(w.word));
      let pool = available.length > 0 ? available : levelWords;
      if (available.length === 0) usedWords = [];
      picked = pool[Math.floor(Math.random() * pool.length)];
    }

    currentQuestion = { word: picked.word, hint: picked.hint, answer: picked.word.toLowerCase() };
    usedWords.push(picked.word);

    document.getElementById('hint-text').innerHTML = picked.hint;
    setTimeout(() => hearWord(), 400);
  } else {
    document.getElementById('question-text').style.display = 'block';
    document.getElementById('hint-text').style.display = 'block';

    const generators = MATHS[currentProfile.level];
    const tags = MATHS_TAGS[currentProfile.level];
    const sel = selectWeighted(generators, tags, currentProfile, currentProfile.level, lastMathTags, missedMathTypes);
    currentQuestion = sel.gen();
    currentQuestionTag = sel.tag;
    lastMathTags.push(sel.tag);
    if (lastMathTags.length > 2) lastMathTags.shift();

    document.getElementById('question-text').textContent = currentQuestion.question;
    document.getElementById('hint-text').textContent = currentQuestion.hint;

    // Render optional visual (e.g. block arrays for multiplication)
    const vizEl = document.getElementById('question-visual');
    if (currentQuestion.visual) {
      vizEl.style.display = 'flex';
      vizEl.innerHTML = currentQuestion.visual;
    } else {
      vizEl.style.display = 'none';
      vizEl.innerHTML = '';
    }
  }
}

// ===== TTS =====
function getIrishVoice() {
  const voices = window.speechSynthesis.getVoices();
  return voices.find(v => v.lang === 'en-IE')
    || voices.find(v => v.lang.startsWith('en-IE'))
    || voices.find(v => v.name.toLowerCase().includes('moira'))
    || voices.find(v => v.lang.startsWith('en-GB'))
    || voices.find(v => v.lang.startsWith('en'));
}

function speakText(text, rate) {
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = rate || 0.9;
  const voice = getIrishVoice();
  if (voice) utter.voice = voice;
  window.speechSynthesis.speak(utter);
}

function hearWord() {
  if (!currentQuestion || currentMode !== 'spelling') return;
  speakText(currentQuestion.word, 0.85);
}

// ===== CHECK ANSWER (Elsie/Freya) =====
function checkAnswer() {
  if (waiting) return;

  const input = document.getElementById('game-input');
  const raw = input.value.trim();
  if (!raw) return;

  let correct = false;

  if (currentMode === 'spelling') {
    correct = raw.toLowerCase() === currentQuestion.answer;
  } else {
    const userAns = raw.replace(/\s/g, '').toLowerCase();
    const expected = String(currentQuestion.answer).replace(/\s/g, '').toLowerCase();

    correct = userAns === expected;

    if (!correct && currentQuestion.acceptAlt) {
      correct = currentQuestion.acceptAlt.some(alt => {
        const normAlt = String(alt).replace(/\s/g, '').toLowerCase();
        return userAns === normAlt;
      });
    }

    if (!correct) {
      const userNum = parseFloat(userAns);
      const expNum = parseFloat(expected);
      if (!isNaN(userNum) && !isNaN(expNum) && Math.abs(userNum - expNum) < 0.01) {
        correct = true;
      }
    }
  }

  const p = currentProfile;
  const maxLevel = 5;

  if (correct) {
    input.classList.add('correct');
    document.getElementById('feedback').textContent = pick(CORRECT_MSGS);
    document.getElementById('feedback').className = 'feedback correct-fb';
    p.score++;
    p.streak++;
    if (p.streak > p.bestStreak) p.bestStreak = p.streak;

    // Spelling: remove from missed words if gotten right
    if (currentMode === 'spelling' && currentQuestion.word) {
      const idx = missedWords.indexOf(currentQuestion.word);
      if (idx !== -1) missedWords.splice(idx, 1);
    }

    recordAnswer(p, true);
    if (currentMode === 'maths' && currentQuestionTag) {
      recordTypeResult(p, p.level, currentQuestionTag, true);
      var idx = missedMathTypes.indexOf(currentQuestionTag);
      if (idx !== -1) missedMathTypes.splice(idx, 1);
    }
    spawnConfetti();

    const adaptive = checkAdaptive(p, maxLevel);
    if (adaptive === 'up') {
      p.level++;
      p.recentAnswers = [];
      saveProfile(p);
      updateUI();
      showLevelChange('up');
      setTimeout(() => nextQuestion(), 2200);
      waiting = true;
      return;
    }
  } else {
    input.classList.add('wrong');
    document.getElementById('feedback').textContent = pick(WRONG_MSGS);
    document.getElementById('feedback').className = 'feedback wrong-fb';

    if (currentMode === 'spelling') {
      document.getElementById('correct-answer').textContent = currentQuestion.word;
      // Add to missed words for recycling
      if (!missedWords.includes(currentQuestion.word)) {
        missedWords.push(currentQuestion.word);
      }
      setTimeout(() => speakText(currentQuestion.word, 0.7), 300);
    } else {
      // Show full equation for maths (Numberblocks principle: representation IS the concept)
      const q = currentQuestion.question.replace(' = ?', '');
      document.getElementById('correct-answer').textContent = q + ' = ' + currentQuestion.answer;
    }

    p.streak = 0;
    recordAnswer(p, false);
    if (currentMode === 'maths' && currentQuestionTag) {
      recordTypeResult(p, p.level, currentQuestionTag, false);
      missedMathTypes.push(currentQuestionTag);
    }

    const adaptive = checkAdaptive(p, maxLevel);
    if (adaptive === 'down') {
      p.level--;
      p.recentAnswers = [];
      saveProfile(p);
      updateUI();
      showLevelChange('down');
      setTimeout(() => nextQuestion(), 2200);
      waiting = true;
      return;
    }
  }

  saveProfile(p);
  updateUI();

  waiting = true;
  document.getElementById('btn-check').textContent = 'Next \u2192';
  document.getElementById('btn-check').onclick = () => nextQuestion();
  input.disabled = true;
}

// ===== TEDDY GAME =====
function startTeddyGame() {
  currentMode = 'mixed';
  currentProfile = getProfile('mixed', 'teddy');
  teddySessionScore = 0;
  showScreen('screen-teddy');
  updateTeddyStars();
  nextTeddyQuestion();
}

function updateTeddyStars() {
  const el = document.getElementById('teddy-stars');
  const filled = Math.min(teddySessionScore, 10);
  const empty = 10 - filled;
  el.textContent = '\u2B50'.repeat(filled) + '\u2606'.repeat(empty);
  if (teddySessionScore > 0 && teddySessionScore % 10 === 0) {
    el.textContent = '\uD83C\uDF1F\uD83C\uDF89 Super Star! \uD83C\uDF89\uD83C\uDF1F';
  }
}

function nextTeddyQuestion() {
  waiting = false;
  document.getElementById('teddy-feedback').textContent = '';
  document.getElementById('teddy-feedback').className = 'teddy-feedback';

  const level = currentProfile.level || 1;
  const generators = TEDDY_Q[level] || TEDDY_Q[1];
  const tags = TEDDY_TAGS[level] || TEDDY_TAGS[1];
  const sel = selectWeighted(generators, tags, currentProfile, level, lastTeddyTags, missedTeddyTypes);
  currentQuestion = sel.gen();
  currentQuestionTag = sel.tag;
  lastTeddyTags.push(sel.tag);
  if (lastTeddyTags.length > 2) lastTeddyTags.shift();

  document.getElementById('teddy-prompt').textContent = currentQuestion.prompt;

  const visualEl = document.getElementById('teddy-visual');
  if (currentQuestion.visualIsHTML) {
    visualEl.innerHTML = currentQuestion.visual || '';
  } else {
    visualEl.textContent = currentQuestion.visual || '';
  }

  // Render choices
  const choicesEl = document.getElementById('teddy-choices');
  choicesEl.innerHTML = '';
  currentQuestion.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'teddy-choice';
    if (currentQuestion.choiceLabels) {
      btn.innerHTML = currentQuestion.choiceLabels[i];
    } else {
      btn.textContent = choice;
    }
    btn.onclick = () => checkTeddyAnswer(choice, btn);
    choicesEl.appendChild(btn);
  });

  // Speak prompt
  setTimeout(() => speakText(currentQuestion.speak, 0.85), 400);
}

function checkTeddyAnswer(chosen, btnEl) {
  if (waiting) return;
  waiting = true;

  const correct = chosen === currentQuestion.answer;
  const p = currentProfile;
  const feedbackEl = document.getElementById('teddy-feedback');
  const allBtns = document.querySelectorAll('#teddy-choices .teddy-choice');

  // Disable all buttons
  allBtns.forEach(b => b.classList.add('disabled'));

  if (correct) {
    btnEl.classList.add('correct-choice');
    feedbackEl.textContent = pick(TEDDY_CORRECT);
    feedbackEl.className = 'teddy-feedback correct-fb';
    p.score++;
    p.streak++;
    if (p.streak > p.bestStreak) p.bestStreak = p.streak;
    teddySessionScore++;
    updateTeddyStars();
    recordAnswer(p, true);
    if (currentQuestionTag) {
      recordTypeResult(p, p.level, currentQuestionTag, true);
      var idx = missedTeddyTypes.indexOf(currentQuestionTag);
      if (idx !== -1) missedTeddyTypes.splice(idx, 1);
    }
    spawnConfetti();

    setTimeout(() => speakText(pick(TEDDY_CORRECT), 0.9), 200);

    const adaptive = checkAdaptive(p, 3); // Teddy has 3 levels
    if (adaptive === 'up') {
      p.level++;
      p.recentAnswers = [];
      saveProfile(p);
      setTimeout(() => nextTeddyQuestion(), 2000);
      return;
    }

    saveProfile(p);
    setTimeout(() => nextTeddyQuestion(), 1500);
  } else {
    btnEl.classList.add('wrong-choice');
    const spokenAnswer = currentQuestion.speakAnswer || currentQuestion.answer;
    feedbackEl.textContent = "Nearly! It's " + spokenAnswer;
    feedbackEl.className = 'teddy-feedback wrong-fb';

    // Highlight correct answer
    allBtns.forEach(b => {
      const val = currentQuestion.choiceLabels ? null : b.textContent;
      if (val === currentQuestion.answer) {
        b.classList.add('correct-choice');
      }
    });

    p.streak = 0;
    recordAnswer(p, false);
    if (currentQuestionTag) {
      recordTypeResult(p, p.level, currentQuestionTag, false);
      missedTeddyTypes.push(currentQuestionTag);
    }

    setTimeout(() => speakText("Nearly! It's " + spokenAnswer, 0.85), 200);

    const adaptive = checkAdaptive(p, 3);
    if (adaptive === 'down') {
      p.level--;
      p.recentAnswers = [];
      saveProfile(p);
      setTimeout(() => nextTeddyQuestion(), 2500);
      return;
    }

    saveProfile(p);
    setTimeout(() => nextTeddyQuestion(), 2500);
  }
}

// ===== EFFECTS =====
function showLevelChange(direction) {
  const div = document.createElement('div');
  div.className = 'level-change ' + direction;
  if (direction === 'up') {
    div.innerHTML = '<div class="emoji">\uD83D\uDE80</div><div class="msg">Level Up! ' + LEVEL_NAMES[currentProfile.level] + '!</div>';
  } else {
    div.innerHTML = '<div class="emoji">\uD83D\uDCAA</div><div class="msg">Let\'s practise at ' + LEVEL_NAMES[currentProfile.level] + '</div>';
  }
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2100);
}

function spawnConfetti() {
  const colors = ['#ff6b9d', '#c084fc', '#60a5fa', '#34d399', '#fbbf24', '#fb923c'];
  for (let i = 0; i < 20; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top = '-10px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    piece.style.animationDuration = (1 + Math.random()) + 's';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 2000);
  }
}

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (document.getElementById('screen-game').classList.contains('active')) {
      if (waiting) {
        nextQuestion();
      } else {
        checkAnswer();
      }
    }
  }
});

// ===== KEYBOARD DETECTION (mobile) =====
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const isKeyboard = window.visualViewport.height < window.innerHeight * 0.75;
    document.body.classList.toggle('keyboard-open', isKeyboard);
  });
}

// Load voices
window.speechSynthesis.onvoiceschanged = () => {};
window.speechSynthesis.getVoices();

init();
</script>
